<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DolceVita SweetOrder - Perfil</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Sticky Navbar -->
    <nav class="navbar">
        <div class="navbar-logo" onclick="window.location.href='home.html'"><img src="assets/logo.png" alt="DolceVita" class="navbar-logo-img"></div>
        <div class="nav-links">
            <a href="home.html" class="nav-link">Home</a>
            <a href="produtos.html" class="nav-link">Bolos</a>
            <a href="receitas.html" class="nav-link">Receitas</a>
            <a href="perfil.html" class="nav-link active">Perfil</a>
            <a href="#" class="nav-link" onclick="logout(); return false;">Sair</a>
        </div>
        <div class="btn-cart-icon">
            <svg class="icon-svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <div class="cart-badge" style="display: none;">0</div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <div class="container">
        <div class="profile-layout">
            <!-- Sidebar Navigation -->
            <div class="profile-sidebar">
                <div class="profile-sidebar-item active" onclick="window.location.href='perfil.html'">
                    <svg class="icon-svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> Meu Perfil
                </div>
                <div class="profile-sidebar-item" onclick="window.location.href='meus-pedidos.html'">
                    <svg class="icon-svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><polygon points="12 22.08 12 12 3 6.92 3 17.08 12 22.08"></polygon><polygon points="12 22.08 12 12 21 6.92 21 17.08 12 22.08"></polygon><polygon points="12 12 3 6.92 12 1.84 21 6.92 12 12"></polygon></svg> Meus Pedidos
                </div>
                <div class="profile-sidebar-item" onclick="window.location.href='home.html'">
                    <svg class="icon-svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> Voltar para Home
                </div>
            </div>

            <!-- Profile Content Area -->
            <div class="profile-content">
                <h2 style="color: var(--red-dark); margin-bottom: 25px; font-size: 28px;">Meus Dados</h2>
                
                <form id="profile-edit-form" onsubmit="saveProfileChanges(event)">
                    <h3 style="color: var(--blue-normal); margin-bottom: 15px; border-bottom: 1px solid var(--blue-light); padding-bottom: 5px;">Informações Pessoais</h3>
                    
                    <div class="form-group">
                        <label for="p-fullname">Nome Completo</label>
                        <input type="text" id="p-fullname" required>
                    </div>
                    
                    <div class="form-group" style="flex-direction: row; gap: 15px;">
                        <div style="flex: 1;">
                            <label for="p-email">E-mail</label>
                            <input type="email" id="p-email" required>
                        </div>
                        <div style="flex: 1;">
                            <label for="p-phone">Celular</label>
                            <input type="tel" id="p-phone" required>
                        </div>
                    </div>

                    <h3 style="color: var(--blue-normal); margin-top: 35px; margin-bottom: 15px; border-bottom: 1px solid var(--blue-light); padding-bottom: 5px;">Endereço Padrão</h3>
                    
                    <div class="form-group">
                        <label for="p-zipcode">CEP</label>
                        <input type="text" id="p-zipcode" required>
                    </div>
                    <div class="form-group">
                        <label for="p-street">Rua</label>
                        <input type="text" id="p-street" required>
                    </div>
                    <div class="form-group" style="flex-direction: row; gap: 15px;">
                        <div style="flex: 1;">
                            <label for="p-number">Número</label>
                            <input type="text" id="p-number" required>
                        </div>
                        <div style="flex: 2;">
                            <label for="p-complement">Complemento</label>
                            <input type="text" id="p-complement">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="p-city">Cidade</label>
                        <input type="text" id="p-city" required>
                    </div>

                    <button type="submit" class="btn-primary" style="margin-top: 30px; width: 100%; height: 60px; font-size: 20px;">
                        Salvar Alterações
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-links">
            <a href="#" class="footer-link">Termos de uso</a>
            <a href="#" class="footer-link">Privacidade</a>
            <a href="#" class="footer-link">Reembolso</a>
        </div>
        <div class="footer-contact" style="display:flex; align-items:center; gap:8px;">
            <svg class="icon-svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg> contato@docevita.com
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
    
    <script>
        let currentUsername = '';

        function loadUserProfile() {
            const token = localStorage.getItem('dolcevita_token');
            if (!token) return;

            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                currentUsername = payload.sub;
                
                const profileStr = localStorage.getItem(`profile_${currentUsername}`);
                if (profileStr) {
                    const prof = JSON.parse(profileStr);
                    document.getElementById('p-fullname').value = prof.fullname || '';
                    document.getElementById('p-email').value = prof.email || '';
                    document.getElementById('p-phone').value = prof.phone || '';
                    document.getElementById('p-zipcode').value = prof.zipcode || '';
                    document.getElementById('p-street').value = prof.street || '';
                    document.getElementById('p-number').value = prof.number || '';
                    document.getElementById('p-complement').value = prof.complement || '';
                    document.getElementById('p-city').value = prof.city || '';
                }
            } catch(e) {
                console.error("Error loading user profile details", e);
            }
        }

        function saveProfileChanges(e) {
            e.preventDefault();
            if (!currentUsername) return;

            const updatedProfile = {
                fullname: document.getElementById('p-fullname').value.trim(),
                email: document.getElementById('p-email').value.trim(),
                phone: document.getElementById('p-phone').value.trim(),
                zipcode: document.getElementById('p-zipcode').value.trim(),
                street: document.getElementById('p-street').value.trim(),
                number: document.getElementById('p-number').value.trim(),
                complement: document.getElementById('p-complement').value.trim(),
                city: document.getElementById('p-city').value.trim()
            };

            localStorage.setItem(`profile_${currentUsername}`, JSON.stringify(updatedProfile));
            alert('Perfil atualizado com sucesso!');
        }

        document.addEventListener('DOMContentLoaded', loadUserProfile);
    </script>
</body>
</html>
