<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DolceVita SweetOrder - Meus Pedidos</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .order-history-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .order-id-link {
            color: var(--red-normal);
            font-weight: 600;
            text-decoration: underline;
        }
        .order-id-link:hover {
            color: var(--red-dark);
        }
        .item-list-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }
        .item-list-table th, .item-list-table td {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid var(--blue-light);
        }
        .item-list-table th {
            font-family: 'Poppins', sans-serif;
            color: var(--blue-normal);
        }
    </style>
</head>
<body>
    <!-- Sticky Navbar -->
    <nav class="navbar">
        <div class="navbar-logo" onclick="window.location.href='home.html'"><img src="assets/logo.png" alt="DolceVita" class="navbar-logo-img"></div>
        <div class="nav-links">
            <a href="home.html" class="nav-link">Home</a>
            <a href="produtos.html" class="nav-link">Bolos</a>
            <a href="receitas.html" class="nav-link">Receitas</a>
            <a href="perfil.html" class="nav-link active">Perfil</a>
            <a href="#" class="nav-link" onclick="logout(); return false;">Sair</a>
        </div>
        <div class="btn-cart-icon">
            <svg class="icon-svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <div class="cart-badge" style="display: none;">0</div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <div class="container">
        <div class="profile-layout">
            <!-- Sidebar Navigation -->
            <div class="profile-sidebar">
                <div class="profile-sidebar-item" onclick="window.location.href='perfil.html'">
                    <svg class="icon-svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> Meu Perfil
                </div>
                <div class="profile-sidebar-item active" onclick="window.location.href='meus-pedidos.html'">
                    <svg class="icon-svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><polygon points="12 22.08 12 12 3 6.92 3 17.08 12 22.08"></polygon><polygon points="12 22.08 12 12 21 6.92 21 17.08 12 22.08"></polygon><polygon points="12 12 3 6.92 12 1.84 21 6.92 12 12"></polygon></svg> Meus Pedidos
                </div>
                <div class="profile-sidebar-item" onclick="window.location.href='home.html'">
                    <svg class="icon-svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> Voltar para Home
                </div>
            </div>

            <!-- Profile Content Area -->
            <div class="profile-content">
                <h2 style="color: var(--red-dark); margin-bottom: 25px; font-size: 28px;">Histórico de Encomendas</h2>
                
                <div id="orders-history-container" class="order-history-list">
                    <div style="text-align: center; padding: 50px;">
                        <h3>Buscando seus pedidos...</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-links">
            <a href="#" class="footer-link">Termos de uso</a>
            <a href="#" class="footer-link">Privacidade</a>
            <a href="#" class="footer-link">Reembolso</a>
        </div>
        <div class="footer-contact" style="display:flex; align-items:center; gap:8px;">
            <svg class="icon-svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg> contato@docevita.com
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
    
    <script>
        async function loadOrderHistory() {
            const token = localStorage.getItem('dolcevita_token');
            if(!token) return;

            const container = document.getElementById('orders-history-container');
            
            try {
                const res = await fetch('http://localhost:8000/orders', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    const orders = await res.json();

                    if (orders.length === 0) {
                        container.innerHTML = `
                            <div style="text-align: center; padding: 40px; color: var(--orange-dark);">
                                <div style="margin-bottom: 15px; color: var(--orange-dark); display: flex; justify-content: center; align-items: center;">
                                    <svg class="icon-svg" viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"></polyline><rect x="1" y="3" width="22" height="5"></rect><line x1="10" y1="12" x2="14" y2="12"></line></svg>
                                </div>
                                <h3 style="margin-top:15px; font-size: 20px;">Você ainda não realizou pedidos</h3>
                                <p style="font-size:14px; margin-top:5px;">Que tal começar a escolher deliciosos bolos no nosso catálogo?</p>
                                <a href="produtos.html" class="btn-primary" style="margin-top:20px; display:inline-flex; height: 50px; width:220px; font-size:16px;">Ver Bolos</a>
                            </div>
                        `;
                        return;
                    }

                    // Sort orders by creation date descending
                    orders.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

                    container.innerHTML = orders.map(order => {
                        const date = new Date(order.created_at).toLocaleString('pt-BR');
                        const statusClass = order.status.toLowerCase();
                        
                        return `
                            <div class="order-history-card">
                                <div class="order-history-header">
                                    <div>
                                        <strong>Pedido: </strong>
                                        <a href="status.html?id=${order.id}" class="order-id-link">${order.id.substring(0, 8)}...</a>
                                        <div style="font-size:12px; color:var(--orange-dark); margin-top:3px;">Realizado em: ${date}</div>
                                    </div>
                                    <span class="order-badge ${statusClass}">${order.status}</span>
                                </div>
                                
                                <div style="font-size:14px; color: var(--text-main); margin-top: 10px;">
                                    <strong>Tipo: </strong> ${order.delivery_type}
                                </div>

                                <table class="item-list-table">
                                    <thead>
                                        <tr>
                                            <th>Produto</th>
                                            <th>Quant.</th>
                                            <th>Valor Unit.</th>
                                            <th>Subtotal</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${order.items.map(item => `
                                            <tr>
                                                <td>${item.product}</td>
                                                <td>${item.quantity}</td>
                                                <td>R$ ${item.unit_price.toFixed(2)}</td>
                                                <td>R$ ${(item.quantity * item.unit_price).toFixed(2)}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                                
                                <div style="text-align: right; margin-top: 15px; font-size: 16px; font-weight:600; color: var(--red-darker);">
                                    Total Geral: R$ ${order.total.toFixed(2)}
                                </div>
                            </div>
                        `;
                    }).join('');

                } else {
                    container.innerHTML = `
                        <div style="text-align: center; padding: 40px; color: var(--red-normal);">
                            <h3>Erro ao buscar o histórico</h3>
                            <p>Tente recarregar a página.</p>
                        </div>
                    `;
                }
            } catch(e) {
                console.error(e);
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: var(--red-normal);">
                        <h3>Erro na conexão com a API</h3>
                        <p>Verifique se os serviços Docker estão em execução.</p>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', loadOrderHistory);
    </script>
</body>
</html>
