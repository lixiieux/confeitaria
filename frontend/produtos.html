<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DolceVita SweetOrder - Bolos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Decorative floating backgrounds -->
    <div class="deco-container">
        <div class="deco-square" style="width: 100px; height: 100px; top: 200px; right: 8%;"></div>
        <div class="deco-ellipse" style="width: 150px; height: 150px; bottom: 300px; left: 5%;"></div>
    </div>

    <!-- Sticky Navbar -->
    <nav class="navbar">
        <div class="navbar-logo" onclick="window.location.href='home.html'"><img src="assets/logo.png" alt="DolceVita" class="navbar-logo-img"></div>
        <div class="nav-links">
            <a href="home.html" class="nav-link">Home</a>
            <a href="produtos.html" class="nav-link active">Bolos</a>
            <a href="receitas.html" class="nav-link">Receitas</a>
            <a href="perfil.html" class="nav-link">Perfil</a>
            <a href="#" class="nav-link" onclick="logout(); return false;">Sair</a>
        </div>
        <div class="btn-cart-icon">
            <svg class="icon-svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <div class="cart-badge" style="display: none;">0</div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <div class="container">
        <h2 class="section-title" style="margin-bottom: 20px;">Nossos Bolos e Doces</h2>
        <p style="margin-bottom: 40px; color: var(--orange-dark); font-size: 18px;">Encontre as melhores opções saudáveis, preparadas com carinho especialmente para você.</p>
        
        <!-- Controls Bar -->
        <div class="catalog-controls">
            <div class="search-wrapper">
                <span class="search-icon" style="display: flex; align-items: center; justify-content: center;"><svg class="icon-svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></span>
                <input type="text" id="catalog-search" class="search-input" placeholder="O que você está procurando hoje? Ex: Red Velvet, Fit, Zero...">
            </div>
            <button class="btn-filter-toggle" onclick="toggleFilterDrawer()">
                <svg class="icon-svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg> Filtros e Categorias
            </button>
        </div>

        <!-- Products Grid -->
        <div class="product-grid" id="product-list">
            <!-- Populated dynamically by app.js -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-links">
            <a href="#" class="footer-link">Termos de uso</a>
            <a href="#" class="footer-link">Privacidade</a>
            <a href="#" class="footer-link">Reembolso</a>
        </div>
        <div class="footer-contact" style="display:flex; align-items:center; gap:8px;">
            <svg class="icon-svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg> contato@docevita.com
        </div>
        <div class="footer-socials" style="display:flex; align-items:center; gap:20px;">
            <a href="#" style="display:flex; align-items:center; gap:6px;">
                <svg class="icon-svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg> Instagram
            </a>
            <a href="#" style="display:flex; align-items:center; gap:6px;">
                <svg class="icon-svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg> Facebook
            </a>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
