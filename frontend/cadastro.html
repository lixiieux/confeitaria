<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DolceVita SweetOrder - Cadastro</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cadastro-step {
            display: none;
        }
        .cadastro-step.active {
            display: block;
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .btn-row {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        .btn-row button {
            flex: 1;
        }
    </style>
</head>
<body>
    <!-- Decorative floating backgrounds -->
    <div class="deco-container">
        <div class="deco-ellipse" style="width: 180px; height: 180px; top: 10%; right: 15%;"></div>
        <div class="deco-square" style="width: 100px; height: 100px; bottom: 8%; left: 10%;"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <img src="assets/logo.png" alt="DolceVita Logo" class="auth-logo-img">
            <p class="auth-subtitle">Crie sua conta em alguns passos</p>

            <!-- Stepper indicators -->
            <div class="stepper">
                <div class="step active" id="step-indicator-1">1</div>
                <div class="step" id="step-indicator-2">2</div>
                <div class="step" id="step-indicator-3">3</div>
            </div>

            <div class="auth-divider"></div>

            <form id="cadastro-form">
                <!-- Step 1: Informações Pessoais -->
                <div class="cadastro-step active" id="step-1">
                    <h3 style="margin-bottom: 20px; color: var(--red-dark);">Dados Pessoais</h3>
                    <div class="form-group">
                        <label for="fullname">Nome Completo</label>
                        <input type="text" id="fullname" placeholder="Ex: Maria Silva" required autocomplete="name">
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="Ex: maria@email.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="phone">Celular</label>
                        <input type="tel" id="phone" placeholder="Ex: (11) 99999-9999" required autocomplete="tel">
                    </div>
                    <div class="btn-row">
                        <button type="button" class="btn-primary" onclick="nextStep(1)">Avançar</button>
                    </div>
                </div>

                <!-- Step 2: Credenciais -->
                <div class="cadastro-step" id="step-2">
                    <h3 style="margin-bottom: 20px; color: var(--red-dark);">Acesso</h3>
                    <div class="form-group">
                        <label for="reg-username">Usuário</label>
                        <input type="text" id="reg-username" placeholder="Escolha um nome de usuário" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Senha</label>
                        <input type="password" id="reg-password" placeholder="Defina uma senha segura" required autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label for="reg-password-confirm">Confirmar Senha</label>
                        <input type="password" id="reg-password-confirm" placeholder="Confirme sua senha" required autocomplete="new-password">
                    </div>
                    <div class="btn-row">
                        <button type="button" class="btn-secondary" onclick="prevStep(2)">Voltar</button>
                        <button type="button" class="btn-primary" onclick="nextStep(2)">Avançar</button>
                    </div>
                </div>

                <!-- Step 3: Endereço Padrão -->
                <div class="cadastro-step" id="step-3">
                    <h3 style="margin-bottom: 20px; color: var(--red-dark);">Endereço de Entrega</h3>
                    <div class="form-group">
                        <label for="zipcode">CEP</label>
                        <input type="text" id="zipcode" placeholder="Ex: 01001-000" required autocomplete="postal-code">
                    </div>
                    <div class="form-group">
                        <label for="street">Rua</label>
                        <input type="text" id="street" placeholder="Nome da rua/avenida" required autocomplete="address-line1">
                    </div>
                    <div class="form-group" style="flex-direction: row; gap: 15px;">
                        <div style="flex: 1;">
                            <label for="number">Número</label>
                            <input type="text" id="number" placeholder="Nº" required autocomplete="address-line2">
                        </div>
                        <div style="flex: 2;">
                            <label for="complement">Complemento</label>
                            <input type="text" id="complement" placeholder="Apto, Bloco, etc." autocomplete="address-line3">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="city">Cidade</label>
                        <input type="text" id="city" placeholder="Ex: São Paulo" required autocomplete="address-level2">
                    </div>
                    <div class="btn-row">
                        <button type="button" class="btn-secondary" onclick="prevStep(3)">Voltar</button>
                        <button type="submit" class="btn-primary">Finalizar Cadastro</button>
                    </div>
                </div>
            </form>

            <div class="auth-footer">
                <p>Já possui uma conta? <a href="login.html">Faça login</a></p>
            </div>
        </div>
    </div>

    <script>
        function updateIndicators(currentStep) {
            for(let i = 1; i <= 3; i++) {
                const el = document.getElementById(`step-indicator-${i}`);
                if (i < currentStep) {
                    el.className = "step completed";
                } else if (i === currentStep) {
                    el.className = "step active";
                } else {
                    el.className = "step";
                }
            }
        }

        function validateStepFields(stepId) {
            const inputs = document.getElementById(stepId).querySelectorAll('input[required]');
            let valid = true;
            inputs.forEach(input => {
                if (!input.value.trim()) {
                    input.reportValidity();
                    valid = false;
                }
            });
            return valid;
        }

        function nextStep(current) {
            if (!validateStepFields(`step-${current}`)) return;

            // Custom checks for step 2
            if (current === 2) {
                const pass = document.getElementById('reg-password').value;
                const passConf = document.getElementById('reg-password-confirm').value;
                if (pass !== passConf) {
                    alert('As senhas não coincidem!');
                    return;
                }
            }

            document.getElementById(`step-${current}`).classList.remove('active');
            document.getElementById(`step-${current + 1}`).classList.add('active');
            updateIndicators(current + 1);
        }

        function prevStep(current) {
            document.getElementById(`step-${current}`).classList.remove('active');
            document.getElementById(`step-${current - 1}`).classList.add('active');
            updateIndicators(current - 1);
        }
    </script>
    <script src="js/auth.js"></script>
</body>
</html>
