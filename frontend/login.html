<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DolceVita SweetOrder - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Decorative floating backgrounds -->
    <div class="deco-container">
        <div class="deco-square" style="width: 120px; height: 120px; top: 15%; left: 8%;"></div>
        <div class="deco-ellipse" style="width: 200px; height: 200px; bottom: 10%; right: 12%;"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <img src="assets/logo.png" alt="DolceVita Logo" class="auth-logo-img">
            <p class="auth-subtitle">Viva Doce e Saudável</p>
            
            <div class="auth-divider"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" placeholder="Digite seu usuário (Ex: admin)" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Digite sua senha" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn-primary">Entrar</button>
            </form>

            <div class="auth-footer">
                <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
            </div>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
