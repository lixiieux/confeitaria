<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DolceVita SweetOrder - Splash</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Decorative floating backgrounds -->
    <div class="deco-container">
        <div class="deco-square" style="width: 150px; height: 150px; top: 10%; left: 10%;"></div>
        <div class="deco-ellipse" style="width: 250px; height: 250px; bottom: 15%; right: 10%;"></div>
        <div class="deco-square" style="width: 80px; height: 80px; bottom: 20%; left: 15%;"></div>
        <div class="deco-ellipse" style="width: 120px; height: 120px; top: 15%; right: 20%;"></div>
    </div>

    <div class="splash-container">
        <div class="splash-logo-wrap">
            <img src="assets/logo.png" alt="DolceVita Logo" class="auth-logo-img" style="height: 180px; margin-bottom: 5px;">
            <p>Viva Doce e Saudável</p>
        </div>
        <div class="splash-actions">
            <a href="login.html" class="btn-primary">Acessar sua conta</a>
            <a href="cadastro.html" class="btn-secondary">Criar uma conta</a>
        </div>
    </div>
</body>
</html>
