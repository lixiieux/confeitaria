name: DolceVita CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: cd api && pip install -r requirements.txt
      - name: Create test .env
        run: |
          cp .env.example api/.env
          sed -i 's|DATABASE_URL=.*|DATABASE_URL=sqlite:///./test.db|' api/.env
      - name: Run tests
        run: |
          cd api
          pytest tests/ -v --cov=. --cov-report=xml
      - name: Lint
        run: |
          pip install flake8
          flake8 api/ --max-line-length=100 --exclude=venv

