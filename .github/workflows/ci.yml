name: DolceVita CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: cd api && pip install -r requirements.txt
      - name: Run tests
        run: |
          cd api
          echo "No tests created yet"
      - name: Lint
        run: |
          pip install flake8
          flake8 api/ --max-line-length=100 --exclude=venv
